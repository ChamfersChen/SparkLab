# Alembic 配置 - 数据库迁移
# 注意：sqlalchemy.url 在 env.py 中由 sparklab.config 注入，此处留空。

[alembic]
script_location = alembic
prepend_sys_path = . package server
version_path_separator = os
sqlalchemy.url =

[post_write_hooks]
# 自动用 ruff 格式化新生成的迁移脚本
hooks = ruff
ruff.type = console_scripts
ruff.entrypoint = ruff
ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
